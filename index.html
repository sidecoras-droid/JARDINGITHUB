<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Eventos - Jardin Jako</title>
    <link href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body onclick="handleGlobalClick(event)">

    <nav>
        <div class="nav-left">
            <svg class="nav-home-icon" viewBox="0 0 24 24" onclick="showHomeText(event)">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </div>
        <div class="nav-links">
            <button class="menu-btn" onclick="toggleOverlay('menu-overlay', event)">MENÚ</button>
            <button class="menu-btn" onclick="toggleOverlay('quotes-overlay', event)">COTIZACIONES</button>
        </div>
    </nav>

    <main id="workspace">
        <h1 id="jardin-text">Jardin Jako</h1>
    </main>

    <div id="menu-overlay" class="overlay">
        <div class="close-btn" onclick="toggleOverlay('menu-overlay', event)">&times;</div>
        <h1>Menú</h1>
        <h2>Postres</h2>
        <ul>
            <li>Arroz con leche</li>
            <li>Pastel de queso</li>
        </ul>
    </div>

    <div id="quotes-overlay" class="overlay">
        <div class="close-btn" onclick="toggleOverlay('quotes-overlay', event)">&times;</div>
        <h1>Cotizaciones</h1>
        <p class="quote-text">Prepara tu cotización en Linea</p>
    </div>

    <script>
        function handleGlobalClick(event) {
            if (event.target.id === 'workspace') {
                const text = document.getElementById('jardin-text');
                text.style.display = 'block';
            }
        }

        function toggleOverlay(id, event) {
            if (event) event.stopPropagation();
            document.querySelectorAll('.overlay').forEach(ov => {
                if (ov.id !== id) ov.style.display = 'none';
            });
            const overlay = document.getElementById(id);
            const isVisible = (overlay.style.display === 'flex');
            overlay.style.display = isVisible ? 'none' : 'flex';
        }

        function showHomeText(event) {
            if (event) event.stopPropagation();
            document.querySelectorAll('.overlay').forEach(ov => ov.style.display = 'none');
            const text = document.getElementById('jardin-text');
            text.style.display = 'block';
        }
    </script>
</body>
</html>
